name: Release VPN client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            exe: ""
          - os: macos-14
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            exe: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            exe: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            exe: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vpnnode

      - name: Install Linux musl linker
        if: contains(matrix.target, 'unknown-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build vpn-client
        working-directory: vpnnode
        run: cargo build --locked --release -p vpn-client-cli --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          binary="vpn-client${{ matrix.exe }}"
          asset="vpn-client-${{ matrix.target }}.${{ matrix.archive_ext }}"

          mkdir -p dist package
          cp "vpnnode/target/${{ matrix.target }}/release/${binary}" "package/${binary}"
          cp vpnnode/README.md package/README.md

          if [[ "${asset}" == *.zip ]]; then
            7z a "dist/${asset}" ./package/*
          else
            tar -C package -czf "dist/${asset}" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-client-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
