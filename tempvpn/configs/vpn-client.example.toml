# Copy locally for optional overrides. The client pays with mppx, using the
# account created by https://mpp.dev/quickstart/agent.
node_url = "http://USA_VPS_IP:8080"
mppx_command = "mppx"
# mppx_account = "default"
# mppx_config = "mppx.config.ts"
# mppx_network = "testnet"
# mppx_rpc_url = "https://rpc.moderato.tempo.xyz"
proxy_addr = "127.0.0.1:1080"
status_file = "/tmp/vpn-client-status.json"
wg_quick_command = "wg-quick"
wg_command = "wg"
interface_name = "vpnclient0"

# Optional but recommended. If unset, vpn-client compares against the host
# portion of the daemon session endpoint when it is an IP address.
expected_exit_ip = "USA_VPS_IP"
